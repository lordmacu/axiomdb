name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace

      # Disabled for now to avoid spending GitHub Actions minutes on checks
      # that are already being run locally. Uncomment these steps to restore
      # full CI validation later.
      #
      # - name: cargo test
      #   run: cargo test --workspace
      #
      # - name: cargo clippy
      #   run: cargo clippy --workspace -- -D warnings
      #
      # - name: cargo fmt
      #   run: cargo fmt --check

  build-server:
    name: Build server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build -p axiomdb-server --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: axiomdb-server-${{ runner.os }}-ci
          path: |
            target/release/axiomdb-server
            target/release/axiomdb-server.exe
          if-no-files-found: ignore
