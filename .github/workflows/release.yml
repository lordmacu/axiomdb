name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build server binary for each platform ─────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — static musl (runs on any Linux, Docker FROM scratch)
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: axiomdb-server-linux-x86_64
            use_zigbuild: true

          # macOS builds disabled — re-enable when approaching stable release
          # - target: aarch64-apple-darwin
          #   runner: macos-latest
          #   artifact: axiomdb-server-macos-aarch64
          # - target: x86_64-apple-darwin
          #   runner: macos-latest
          #   artifact: axiomdb-server-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild (Linux musl)
        if: matrix.use_zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (zigbuild — musl)
        if: matrix.use_zigbuild
        run: cargo zigbuild -p axiomdb-server --target ${{ matrix.target }} --release

      - name: Build (native)
        if: "!matrix.use_zigbuild"
        run: cargo build -p axiomdb-server --target ${{ matrix.target }} --release

      - name: Strip binary (Linux/macOS)
        run: strip target/${{ matrix.target }}/release/axiomdb-server || true

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/axiomdb-server ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Build embedded library ─────────────────────────────────────────────────
  build-embedded:
    name: Build embedded (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: libaxiomdb_embedded-linux-x86_64
            lib: target/release/libaxiomdb_embedded.a
          # macOS disabled — re-enable when approaching stable release
          # - os: macos-latest
          #   artifact: libaxiomdb_embedded-macos
          #   lib: target/release/libaxiomdb_embedded.a

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-embedded-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build embedded (static)
        run: cargo build -p axiomdb-embedded --release
        continue-on-error: true   # embedded crate may not exist yet in early phases

      - name: Rename artifact
        run: cp ${{ matrix.lib }} ${{ matrix.artifact }}.a 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.a
          if-no-files-found: ignore

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, build-embedded]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          TAG=${{ steps.version.outputs.version }}
          cat <<EOF > release_notes.md
          ## AxiomDB $TAG

          ### Binaries

          | Platform | File | Notes |
          |---|---|---|
          | Linux x86-64 | \`axiomdb-server-linux-x86_64\` | Static musl — runs on any Linux, Docker FROM scratch |
          | macOS Apple Silicon | \`axiomdb-server-macos-aarch64\` | macOS 12+ arm64 |
          | macOS Intel | \`axiomdb-server-macos-x86_64\` | macOS 12+ x86_64 |

          ### Quick start

          \`\`\`bash
          # Linux
          chmod +x axiomdb-server-linux-x86_64
          ./axiomdb-server-linux-x86_64

          # Connect with any MySQL client
          mysql -h 127.0.0.1 -P 3306 -u root
          \`\`\`

          ### Docker (Linux binary)

          \`\`\`dockerfile
          FROM scratch
          COPY axiomdb-server-linux-x86_64 /axiomdb-server
          EXPOSE 3306
          CMD ["/axiomdb-server"]
          \`\`\`

          ---
          See [CHANGELOG](https://github.com/lordmacu/nexusdb/blob/main/docs/) for full details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: AxiomDB ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            artifacts/**/*
