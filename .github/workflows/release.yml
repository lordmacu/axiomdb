name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build Linux server binary only ────────────────────────────────────────
  build-linux:
    name: Build Linux x86_64 musl
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cargo-zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-unknown-linux-musl-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Linux release
        run: cargo zigbuild -p axiomdb-server --target x86_64-unknown-linux-musl --release

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/axiomdb-server || true

      - name: Rename binary
        run: cp target/x86_64-unknown-linux-musl/release/axiomdb-server axiomdb-server-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axiomdb-server-linux-x86_64
          path: axiomdb-server-linux-x86_64

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          TAG=${{ steps.version.outputs.version }}
          cat <<EOF > release_notes.md
          ## AxiomDB $TAG

          ### Binaries

          | Platform | File | Notes |
          |---|---|---|
          | Linux x86-64 | \`axiomdb-server-linux-x86_64\` | Static musl — runs on any Linux, Docker FROM scratch |

          ### Quick start

          \`\`\`bash
          # Linux
          chmod +x axiomdb-server-linux-x86_64
          ./axiomdb-server-linux-x86_64

          # Connect with any MySQL client
          mysql -h 127.0.0.1 -P 3306 -u root
          \`\`\`

          ### Docker (Linux binary)

          \`\`\`dockerfile
          FROM scratch
          COPY axiomdb-server-linux-x86_64 /axiomdb-server
          EXPOSE 3306
          CMD ["/axiomdb-server"]
          \`\`\`

          ---
          See [CHANGELOG](https://github.com/lordmacu/nexusdb/blob/main/docs/) for full details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: AxiomDB ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            artifacts/**/*
