# PostgreSQL 16 — Benchmark configuration for AxiomDB comparison
#
# Goal: maximum honest performance with full durability ON.
# Mirrors MySQL bench.cnf in durability posture: fsync=on, synchronous_commit=on.
#
# Memory budget: 2 GB container
#   shared_buffers  = 512 MB  (25% of RAM — PostgreSQL recommendation)
#   effective_cache = 1.5 GB  (planner hint for OS cache)
#   work_mem        = 16 MB   (per-sort/hash operation)

# ── Connections ───────────────────────────────────────────────────────────────
listen_addresses            = '*'
max_connections             = 50
superuser_reserved_connections = 3

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers              = 512MB
effective_cache_size        = 1536MB
work_mem                    = 16MB
maintenance_work_mem        = 128MB
huge_pages                  = off

# ── WAL / Durability (ON — honest comparison with AxiomDB fsync=true) ─────────
# fsync=on: flush WAL to disk on every COMMIT
# Change to off for "pure throughput ceiling" comparison
fsync                       = on
synchronous_commit          = on
wal_sync_method             = fdatasync

# WAL buffers: 16 MB speeds up burst writes
wal_buffers                 = 16MB
wal_compression             = off

# ── Checkpoints ───────────────────────────────────────────────────────────────
# Spread checkpoints to reduce I/O spikes during benchmark
checkpoint_completion_target = 0.9
checkpoint_timeout          = 10min
max_wal_size                = 1GB
min_wal_size                = 256MB

# ── I/O ───────────────────────────────────────────────────────────────────────
effective_io_concurrency    = 2     # matches 2-core container
random_page_cost            = 1.1   # SSD/tmpfs assumption

# ── Parallelism (match 2-core CPU limit) ──────────────────────────────────────
max_parallel_workers_per_gather = 2
max_parallel_workers        = 2
max_parallel_maintenance_workers = 1
parallel_tuple_cost         = 0.1
parallel_setup_cost         = 1000

# ── Background workers ────────────────────────────────────────────────────────
max_worker_processes        = 4

# ── Vacuum / autovacuum ───────────────────────────────────────────────────────
# Keep autovacuum on — it affects real-world numbers
autovacuum                  = on
autovacuum_max_workers      = 2

# ── Logging (minimal — don't pollute benchmark output) ───────────────────────
log_min_messages            = WARNING
log_min_error_statement     = ERROR
log_destination             = 'stderr'
logging_collector           = off

# ── Statistics ────────────────────────────────────────────────────────────────
default_statistics_target   = 100

# ── Locale ────────────────────────────────────────────────────────────────────
# Must be set at initdb time; left here as documentation
# lc_messages = 'en_US.utf8'
# lc_monetary = 'en_US.utf8'
