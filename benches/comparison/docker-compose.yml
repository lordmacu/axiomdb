# AxiomDB Benchmark Stack — 3 self-contained containers
#
# Each container includes its own benchmark tooling and connects
# to its own database on localhost (no network overhead between DB and bench).
#
# All containers have IDENTICAL resource limits: 2 CPU, 2 GB RAM, fsync ON.
#
# Usage:
#   docker compose build         # build custom images (once)
#   docker compose up -d         # start all three
#   python3 bench.py full_scan   # run a scenario on all three in parallel
#   docker compose down -v       # stop and clean

x-resources: &resources
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 2G
      reservations:
        cpus: "2.0"
        memory: 2G

services:

  # ── MySQL 8.0 ──────────────────────────────────────────────────────────────
  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    image: axiomdb-bench/mysql:latest
    container_name: axiomdb_bench_mysql
    restart: unless-stopped
    <<: *resources

    environment:
      MYSQL_ROOT_PASSWORD: bench
      MYSQL_DATABASE: bench
      MYSQL_ROOT_HOST: "%"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./conf/mysql/my.cnf:/etc/mysql/conf.d/bench.cnf:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pbench"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: axiomdb-bench/postgres:latest
    container_name: axiomdb_bench_pg
    restart: unless-stopped
    <<: *resources

    environment:
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
      POSTGRES_USER: postgres

    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./conf/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

    command: postgres -c config_file=/etc/postgresql/postgresql.conf

  # ── AxiomDB ────────────────────────────────────────────────────────────────
  # Binary is built on host and copied via `docker cp` by bench.py.
  # Container stays alive with `sleep infinity`.
  axiomdb:
    build:
      context: ../..          # workspace root — needs full Cargo workspace
      dockerfile: benches/comparison/axiomdb/Dockerfile
    image: axiomdb-bench/axiomdb:latest
    container_name: axiomdb_bench_axiomdb
    restart: unless-stopped
    <<: *resources

    volumes:
      - axiomdb_data:/data

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  pg_data:
    driver: local
  axiomdb_data:
    driver: local
